<!DOCTYPE html>
<html dir="ltr" lang="en" class="focus-outline-visible" lazy-loaded="true">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      border: 0;
      font-size: 100%;
      font: inherit;
      vertical-align: baseline;
      box-sizing: border-box;
      animation: startanim 0.3s ease;
    }
    
    @keyframes startanim {
      0% {
        filter: blur(20px);
      }
      100% {
        filter: blur(0px);
      }
    }

    body {
      font-family: "Helvetica", sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      justify-content: center;
      align-items: center;
      background-color: rgba(0, 0, 0, 0.045);
      overflow-x: hidden;
      overflow-y: hidden;
    }

    h1 {
      font-size: 6rem;
      text-align: center;
      -webkit-user-select: none;
      user-select: none;
      margin-bottom: 20px;
      color: #333;
    }

    .searchsection {
      background: transparent;
      padding: 20px;
      max-width: 90%;
      width: 100%;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    #searchform {
      display: flex;
      width: 100%;
      max-width: 600px;
    }

    .search-container {
      position: relative;
      width: 100%;
      display: flex;
      background-color: white;
      box-shadow: 0px 5px 5px rgba(0, 0, 0, 0.085);
      border-radius: 0.5rem;
    }

    #searchinput {
      font-size: 90%;
      width: 100%;
      padding: 10px;
      padding-right: 100px;
      border: 1px solid rgba(0, 0, 0, 0.07);
      border-radius: 0.5rem;
      height: 40px;
      box-sizing: border-box;
      z-index: 0;
      box-shadow: 0px 2px 1px rgba(0, 0, 0, 0.02), 0px 17px 10px rgba(0, 0, 0, 0.025);
      transition: box-shadow 1s ease;
    }

    #searchinput:focus {
      outline: none;
    }

    #searchinput::placeholder {
      opacity: 1;
      transition: opacity 0.2s ease;
    }

    #searchinput:focus::placeholder {
      opacity: 0;
    }

    .searchbutton {
      border-radius: 0.3rem;
      border-left: none;
      border-right: 1px solid rgba(0, 0, 0, 0.2);
      border-top: 1px solid rgba(0, 0, 0, 0.2);
      border-bottom: 1px solid rgba(0, 0, 0, 0.2);
      background-color: white;
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      padding: 0 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      color: rgba(0, 0, 0, 0.5);
    }

    @media(max-width: 600px) {
      h1 {
        font-size: 3rem;
      }

      .searchbutton {
        padding: 0 15px;
      }

      #searchinput {
        padding-right: 80px;
      }
    }
  </style>
</head>

<body>
  <h1 class="omega-title" style="font-family:serif;">Omega</h1>
  <div class="searchsection">
    <form id="searchform" action="https://www.google.com/search" method="GET" autocomplete="off">
      <div class="search-container">
        <input type="text" id="searchinput" name="q" placeholder="Search or type a URL" />
        <!-- <button class="searchbutton" type="submit" style="color:black;">→</button> -->
      </div>
    </form>
  </div>
</body>

</html>
