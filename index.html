<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background: #222;">
    <canvas id="g"></canvas>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const canvas = document.getElementById('g');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const socket = io('https://'); 

        let players = {};

        window.addEventListener('mousemove', e => {
            socket.emit('move', { x: e.clientX, y: e.clientY });
        });

        socket.on('update', data => { players = data; });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let id in players) {
                const p = players[id];
                ctx.fillStyle = (id === socket.id) ? '#00ff00' : '#ff0000';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 15, 0, 7);
                ctx.fill();
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
