<!DOCTYPE html>
<html>
<head>
    <title>IO Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const socket = io("https://sporld-server.onrender.com");

let players = {};
let myPos = { x: 500, y: 500, angle: 0 };

const keys = {};
let mouse = { x: canvas.width / 2, y: canvas.height / 2 };

window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

socket.on("connect", () => {
    console.log("Connected:", socket.id);
});

socket.on("update", data => {
    players = data;
});

function update() {
    const speed = 4;

    if (keys["w"]) myPos.y -= speed;
    if (keys["s"]) myPos.y += speed;
    if (keys["a"]) myPos.x -= speed;
    if (keys["d"]) myPos.x += speed;

    let dx = mouse.x - canvas.width / 2;
    let dy = mouse.y - canvas.height / 2;

    myPos.angle = Math.atan2(dy, dx);

    socket.emit("move", {
        x: myPos.x,
        y: myPos.y,
        angle: myPos.angle
    });
}

function drawTriangle(x, y, angle, color) {
    const size = 20;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    ctx.beginPath();
    ctx.moveTo(size, 0);
    ctx.lineTo(-size, size);
    ctx.lineTo(-size, -size);
    ctx.closePath();

    ctx.fillStyle = color;
    ctx.fill();

    ctx.restore();
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let id in players) {
        const p = players[id];
        if (!p) continue;

        const isMe = id === socket.id;
        drawTriangle(
            p.x,
            p.y,
            p.angle || 0,
            isMe ? "gray" : "white"
        );
    }
}

function loop() {
    update();
    render();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
