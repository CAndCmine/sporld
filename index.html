<!DOCTYPE html>
<html>
<head>
    <title>Sporld.io Tracker</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const socket = io('https://sporld-server.onrender.com');

        let allCursors = {};

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'arrowup') socket.emit('move', 'up');
            if (key === 's' || key === 'arrowdown') socket.emit('move', 'down');
            if (key === 'a' || key === 'arrowleft') socket.emit('move', 'left');
            if (key === 'd' || key === 'arrowright') socket.emit('move', 'right');
        });

        socket.on('update', (data) => {
            allCursors = data;
        });

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let id in allCursors) {
                const c = allCursors[id];
                
                ctx.fillStyle = (id === socket.id) ? '#4CAF50' : '#FFFFFF';
                
                ctx.beginPath();
                ctx.arc(c.x, c.y, 8, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
