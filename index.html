<!DOCTYPE html>
<html>
<head>
    <title>Sporld IO</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const socket = io('https://sporld-server.onrender.com');

        const myName = prompt("Enter a nickname:") || "Guest";
        socket.emit('join', myName);

        let players = {};
        let myPos = { x: 1000, y: 1000 };
        let mousePos = { x: 0, y: 0 };
        const keys = {};
        const SPEED = 7;
        const MAP_SIZE = 2000;

        const resize = () => {
            const dpr = window.devicePixelRatio || 1;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
        };
        window.addEventListener('resize', resize);
        resize();

        window.onkeydown = e => { keys[e.key.toLowerCase()] = true; };
        window.onkeyup = e => { keys[e.key.toLowerCase()] = false; };
        window.onmousemove = e => { mousePos.x = e.clientX; mousePos.y = e.clientY; };

        setInterval(() => {
            if (keys.w || keys.arrowup)    myPos.y -= SPEED;
            if (keys.s || keys.arrowdown)  myPos.y += SPEED;
            if (keys.a || keys.arrowleft)  myPos.x -= SPEED;
            if (keys.d || keys.arrowright) myPos.x += SPEED;

            myPos.x = Math.max(0, Math.min(MAP_SIZE, myPos.x));
            myPos.y = Math.max(0, Math.min(MAP_SIZE, myPos.y));

            const angle = Math.atan2(mousePos.y - window.innerHeight/2, mousePos.x - window.innerWidth/2);
            socket.emit('move', { x: myPos.x, y: myPos.y, angle: angle });
        }, 16);

        socket.on('update', data => { players = data; });

        function render() {
            const dpr = window.devicePixelRatio || 1;
            
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.scale(dpr, dpr);
            ctx.translate(window.innerWidth/2 - myPos.x, window.innerHeight/2 - myPos.y);

            ctx.strokeStyle = "#333";
            ctx.lineWidth = 1;
            for(let i=0; i<=MAP_SIZE; i+=100){
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,MAP_SIZE); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(MAP_SIZE,i); ctx.stroke();
            }
            
            ctx.strokeStyle = "white";
            ctx.lineWidth = 5;
            ctx.strokeRect(0, 0, MAP_SIZE, MAP_SIZE);

            for (let id in players) {
                const p = players[id];
                const isMe = (id === socket.id);
                
                ctx.save();
                
                const drawX = isMe ? myPos.x : p.x;
                const drawY = isMe ? myPos.y : p.y;
                
                ctx.translate(drawX, drawY);
                
                const drawAngle = isMe ? Math.atan2(mousePos.y - window.innerHeight/2, mousePos.x - window.innerWidth/2) : (p.angle || 0);
                ctx.rotate(drawAngle);

                ctx.fillStyle = isMe ? '#4CAF50' : 'white';
                ctx.beginPath();
                ctx.moveTo(20, 0);
                ctx.lineTo(-15, 12);
                ctx.lineTo(-15, -12);
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                ctx.font = "bold 14px Arial";
                ctx.textAlign = "center";
                ctx.fillStyle = isMe ? '#4CAF50' : 'white';
                ctx.fillText(p.name || "Guest", drawX, drawY - 30);
            }

            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
