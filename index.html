<!DOCTYPE html>
<html>
<head>
    <title>Sporld IO</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="game"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const socket = io("https://sporld-server.onrender.com");

let players = {};
let myId = null;

let pos = { x: 1000, y: 1000 };
let keys = {};
let mouse = { x: 0, y: 0 };

const SPEED = 5;
const MAP_SIZE = 2000;

function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

onkeydown = e => keys[e.key.toLowerCase()] = true;
onkeyup = e => keys[e.key.toLowerCase()] = false;
onmousemove = e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
};

const name = prompt("Nickname") || "Guest";
socket.emit("join", name);

socket.on("connect", () => {
    myId = socket.id;
});

setInterval(() => {
    if (keys.w) pos.y -= SPEED;
    if (keys.s) pos.y += SPEED;
    if (keys.a) pos.x -= SPEED;
    if (keys.d) pos.x += SPEED;

    pos.x = Math.max(0, Math.min(MAP_SIZE, pos.x));
    pos.y = Math.max(0, Math.min(MAP_SIZE, pos.y));

    socket.emit("move", {
        x: pos.x,
        y: pos.y,
        angle: Math.atan2(
            mouse.y - canvas.height / 2,
            mouse.x - canvas.width / 2
        )
    });
}, 16);

socket.on("update", data => {
    players = data;
});

function drawPlayer(p, isMe) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle || 0);

    ctx.fillStyle = isMe ? "#4CAF50" : "#e74c3c";

    ctx.beginPath();
    ctx.moveTo(25, 0);
    ctx.lineTo(-15, 15);
    ctx.lineTo(-15, -15);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.fillText(p.name, p.x, p.y - 30);
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const me = players[myId];
    if (!me) return requestAnimationFrame(render);

    ctx.save();
    ctx.translate(canvas.width / 2 - me.x, canvas.height / 2 - me.y);

    for (let id in players) {
        drawPlayer(players[id], id === myId);
    }

    ctx.restore();
    requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
