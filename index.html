<!DOCTYPE html>
<html>
<head>
    <title>Sporld IO</title>
    <style>
        body { margin: 0; background: #f5f5f5; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const socket = io('https://sporld-server.onrender.com');

const myName = prompt("Nickname:") || "Guest";
socket.emit('join', myName);

let players = {};
let myPos = { x: 1000, y: 1000, angle: 0 };
let mousePos = { x: 0, y: 0 };
const keys = {};

const SPEED = 5;
const MAP_SIZE = 2000;

function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
}
window.addEventListener('resize', resize);
resize();

window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => {
    mousePos.x = e.clientX;
    mousePos.y = e.clientY;
};

setInterval(() => {
    if (keys.w || keys.arrowup)    myPos.y -= SPEED;
    if (keys.s || keys.arrowdown)  myPos.y += SPEED;
    if (keys.a || keys.arrowleft)  myPos.x -= SPEED;
    if (keys.d || keys.arrowright) myPos.x += SPEED;

    myPos.x = Math.max(0, Math.min(MAP_SIZE, myPos.x));
    myPos.y = Math.max(0, Math.min(MAP_SIZE, myPos.y));

    myPos.angle = Math.atan2(
        mousePos.y - window.innerHeight / 2,
        mousePos.x - window.innerWidth / 2
    );

    socket.emit('move', {
        x: myPos.x,
        y: myPos.y,
        angle: myPos.angle
    });
}, 16);

socket.on('update', data => {
    players = data;
});

function render() {
    const dpr = window.devicePixelRatio || 1;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    ctx.save();
    ctx.translate(window.innerWidth / 2 - myPos.x, window.innerHeight / 2 - myPos.y);

    ctx.strokeStyle = "#ccc";
    ctx.lineWidth = 1;
    for (let i = 0; i <= MAP_SIZE; i += 100) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, MAP_SIZE); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(MAP_SIZE, i); ctx.stroke();
    }

    ctx.strokeStyle = "#222";
    ctx.lineWidth = 4;
    ctx.strokeRect(0, 0, MAP_SIZE, MAP_SIZE);

    for (let id in players) {
        const p = players[id];
        if (!p) continue;

        const isMe = (id === socket.id);

        const x = isMe ? myPos.x : p.x;
        const y = isMe ? myPos.y : p.y;
        const angle = isMe ? myPos.angle : (typeof p.angle === "number" ? p.angle : 0);

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);

        ctx.fillStyle = isMe ? '#2ecc71' : '#e74c3c';
        ctx.beginPath();
        ctx.moveTo(25, 0);
        ctx.lineTo(-15, 15);
        ctx.lineTo(-15, -15);
        ctx.closePath();
        ctx.fill();

        ctx.restore();

        ctx.fillStyle = "#222";
        ctx.font = "bold 13px Arial";
        ctx.textAlign = "center";
        ctx.fillText(p.name || myName, x, y - 35);
    }

    ctx.restore();
    requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
