<!DOCTYPE html>
<html>
<head>
    <title>Sporld IO</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const socket = io('https://sporld-server.onrender.com', {
    transports: ['websocket'],
    upgrade: false
});

let myName = prompt("Nickname? ") || "Guest";
socket.emit('join', myName);

let players = {};
let myPos = { x: 1000, y: 1000, angle: 0 };
let mousePos = { x: 0, y: 0 };
const keys = {};

const SPEED = 5;
const MAP_SIZE = 2000;
const PLAYER_LENGTH = 25;
const PLAYER_WIDTH = 20;

function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
}
window.addEventListener('resize', resize);
resize();

window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => {
    mousePos.x = e.clientX;
    mousePos.y = e.clientY;
};

setInterval(() => {
    if (keys.w || keys.arrowup)    myPos.y -= SPEED;
    if (keys.s || keys.arrowdown)  myPos.y += SPEED;
    if (keys.a || keys.arrowleft)  myPos.x -= SPEED;
    if (keys.d || keys.arrowright) myPos.x += SPEED;

    myPos.x = Math.max(0, Math.min(MAP_SIZE, myPos.x));
    myPos.y = Math.max(0, Math.min(MAP_SIZE, myPos.y));

    let centerX = window.innerWidth / 2;
    let centerY = window.innerHeight / 2;
    myPos.angle = Math.atan2(mousePos.y - centerY, mousePos.x - centerX);

    socket.emit('move', {
        x: myPos.x,
        y: myPos.y,
        angle: myPos.angle
    });
}, 16);

socket.on('update', data => {
    players = data;
});

function renderPlayer(x, y, angle, color, name) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(PLAYER_LENGTH, 0);
    ctx.lineTo(-PLAYER_WIDTH, PLAYER_WIDTH);
    ctx.lineTo(-PLAYER_WIDTH, -PLAYER_WIDTH);
    ctx.closePath();
    ctx.lineJoin = "round";
    ctx.lineWidth = 12; 
    ctx.strokeStyle = "white";
    ctx.stroke();
    ctx.lineWidth = 8;
    ctx.strokeStyle = "black";
    ctx.stroke();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();

    ctx.fillStyle = "white";
    ctx.font = "14px Arial";
    ctx.textAlign = "center";
    ctx.fillText(name, x, y - 45);
}

function render() {
    const dpr = window.devicePixelRatio || 1;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    ctx.save();
    ctx.translate(window.innerWidth / 2 - myPos.x, window.innerHeight / 2 - myPos.y);

    ctx.strokeStyle = "#333";
    ctx.lineWidth = 1;
    for (let i = 0; i <= MAP_SIZE; i += 100) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, MAP_SIZE); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(MAP_SIZE, i); ctx.stroke();
    }

    ctx.strokeStyle = "white";
    ctx.lineWidth = 4;
    ctx.strokeRect(0, 0, MAP_SIZE, MAP_SIZE);

    for (let id in players) {
        const p = players[id];
        if (!p) continue;

        let angle = typeof p.angle === 'number' ? p.angle : 0;

        renderPlayer(p.x, p.y, angle,
            id === socket.id ? 'rgb(50, 50, 50)' : 'rgb(30, 30, 30)',
            p.name || "Guest"
        );
    }

    ctx.restore();
    requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
