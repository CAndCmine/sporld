<!DOCTYPE html>
<html>
<body style="margin:0; background:#1a1a1a; overflow:hidden">
    <canvas id="c"></canvas>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const socket = io('https://sporld-server.onrender.com');
        
        let players = {};
        const keys = {};

        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.onresize();

        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        // Input
        setInterval(() => {
            if (keys.w || keys.arrowup) socket.emit('move', 'up');
            if (keys.s || keys.arrowdown) socket.emit('move', 'down');
            if (keys.a || keys.arrowleft) socket.emit('move', 'left');
            if (keys.d || keys.arrowright) socket.emit('move', 'right');
        }, 16);

        socket.on('update', (data) => players = data);

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const me = players[socket.id];

            if (me) {
                ctx.save();
                // Center the world on ME
                ctx.translate(canvas.width/2 - me.x, canvas.height/2 - me.y);

                // Border!
                ctx.strokeStyle = "white";
                ctx.strokeRect(0, 0, 2000, 2000);

                // Draw everyone
                for (let id in players) {
                    const p = players[id];
                    ctx.fillStyle = id === socket.id ? '#4CAF50' : 'white';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 15, 0, 7);
                    ctx.fill();
                }
                ctx.restore();
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
