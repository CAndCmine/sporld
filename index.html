<!DOCTYPE html>
<html>
<head>
    <title>Sporld.io</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const socket = io('https://sporld-server.onrender.com');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let allPlayers = {};
        let myLerpPos = { x: 1000, y: 1000 }; // Center spawn point

        const keys = { w: false, a: false, s: false, d: false, 
                       arrowup: false, arrowleft: false, arrowdown: false, arrowright: false };

        window.addEventListener('keydown', (e) => { if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false; });

        // Input loop
        setInterval(() => {
            if (keys.w || keys.arrowup) socket.emit('move', 'up');
            if (keys.s || keys.arrowdown) socket.emit('move', 'down');
            if (keys.a || keys.arrowleft) socket.emit('move', 'left');
            if (keys.d || keys.arrowright) socket.emit('move', 'right');
        }, 1000 / 60);

        socket.on('update', (data) => {
            allPlayers = data;
            if (allPlayers[socket.id]) {
                // Smoothly lerp the local camera toward the server position
                myLerpPos.x += (allPlayers[socket.id].x - myLerpPos.x) * 0.3;
                myLerpPos.y += (allPlayers[socket.id].y - myLerpPos.y) * 0.3;
            }
        });

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Move the world
            const camX = canvas.width / 2 - myLerpPos.x;
            const camY = canvas.height / 2 - myLerpPos.y;

            ctx.save();
            ctx.translate(camX, camY);

            //Grid lines
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 1;
            for (let x = 0; x <= 2000; x += 100) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 2000); ctx.stroke();
            }
            for (let y = 0; y <= 2000; y += 100) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(2000, y); ctx.stroke();
            }

            // World border
            ctx.strokeStyle = "white";
            ctx.lineWidth = 5;
            ctx.strokeRect(0, 0, 2000, 2000);

            //Player rendering
            for (let id in allPlayers) {
                const p = allPlayers[id];
                ctx.fillStyle = (id === socket.id) ? '#4CAF50' : '#FFFFFF';
                
                // Use smoothed position for self raw position for others
                const x = (id === socket.id) ? myLerpPos.x : p.x;
                const y = (id === socket.id) ? myLerpPos.y : p.y;

                ctx.beginPath();
                ctx.arc(x, y, p.size || 15, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();
            requestAnimationFrame(render);
        }

        render();
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
