<!DOCTYPE html>
<html>
<head>
    <title>Sporld IO</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; }
        
        #ui-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }

        .menu-card {
            background: #2a2a2a; padding: 30px; border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); text-align: center; border: 2px solid #444;
        }

        h1 { color: white; margin-bottom: 20px; letter-spacing: 2px; }
        
        input {
            padding: 12px; font-size: 18px; border-radius: 6px; border: none;
            width: 250px; margin-bottom: 20px; outline: none;
        }

        button {
            padding: 12px 30px; font-size: 18px; background: #4CAF50;
            color: white; border: none; border-radius: 6px; cursor: pointer;
            transition: 0.2s; font-weight: bold;
        }

        button:hover { background: #45a049; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div class="menu-card">
        <h1>SPORLD.IO</h1>
        <input type="text" id="nickInput" placeholder="Enter Nickname..." maxlength="12">
        <br>
        <button id="playBtn">PLAY</button>
    </div>
</div>

<canvas id="canvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui-overlay');
const nickInput = document.getElementById('nickInput');
const playBtn = document.getElementById('playBtn');

// Set your server URL here
const socket = io('https://sporld-server.onrender.com', {
    transports: ['websocket']
});

let gameStarted = false;
let players = {};
let myPos = { x: 1000, y: 1000, angle: 0 };
let mousePos = { x: 0, y: 0 };
const keys = {};

const SPEED = 5;
const MAP_SIZE = 3000; // Increased map size
const PLAYER_SIZE = 25;

function resize() {
    canvas.width = window.innerWidth * (window.devicePixelRatio || 1);
    canvas.height = window.innerHeight * (window.devicePixelRatio || 1);
}
window.addEventListener('resize', resize);
resize();

// UI Interaction
playBtn.onclick = () => {
    const name = nickInput.value.trim() || "Guest";
    socket.emit('join', name);
    ui.style.display = 'none';
    gameStarted = true;
};

window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => {
    mousePos.x = e.clientX;
    mousePos.y = e.clientY;
};

// Physics/Input Loop
setInterval(() => {
    if (!gameStarted) return;

    if (keys.w || keys.arrowup) myPos.y -= SPEED;
    if (keys.s || keys.arrowdown) myPos.y += SPEED;
    if (keys.a || keys.arrowleft) myPos.x -= SPEED;
    if (keys.d || keys.arrowright) myPos.x += SPEED;

    myPos.x = Math.max(0, Math.min(MAP_SIZE, myPos.x));
