<!-- public/index.html -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Sporld IO</title>
  <style>
    html,body{margin:0;height:100%;background:#1a1a1a;color:#fff;font-family:Ubuntu,Arial,sans-serif;touch-action:none}
    canvas{display:block;width:100vw;height:100vh}
    #ui-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:10}
    .menu{padding:40px;border-radius:10px;text-align:center;width:600px}
    #nickInput{padding:12px;font-size:18px;border-radius:5px;border:2px solid #a0a0a0;background:#c8c8c8;color:#000;width:200px;margin-bottom:20px;outline:none}
    button{padding:12px 32px;font-size:18px;background:#329632;color:#fff;border:2px solid rgba(10,115,10,1);border-radius:5px;cursor:pointer}
    #status{margin-top:15px;font-size:12px;color:rgba(255,255,255,0.9)}
    #leaderboard{position:fixed;top:20px;right:20px;z-index:5}
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="ui-overlay">
    <div class="menu">
      <div id="status">Connecting to server...</div>
      <br>
      <input type="text" id="nickInput" placeholder="Nickname" maxlength="12">
      <button id="playBtn">Join game</button>
    </div>
  </div>
  <div id="leaderboard"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('status');
    const nickInput = document.getElementById('nickInput');
    const playBtn = document.getElementById('playBtn');
    const uiOverlay = document.getElementById('ui-overlay');
    const socket = io();
    let gameStarted = false;
    let players = {};
    let bullets = [];
    const MAP_SIZE = 2000;
    const myPos = { x: 1000, y: 1000, angle: 0, name: "" };
    const mousePos = { x: window.innerWidth/2, y: window.innerHeight/2 };
    const keys = {};
    socket.on('connect', () => { statusText.innerText = 'Connected'; });
    socket.on('disconnect', () => { statusText.innerText = 'Disconnected'; });
    socket.on('state', data => { if (data.players) players = data.players; if (data.bullets) bullets = data.bullets; });
    playBtn.onclick = () => {
      const name = nickInput.value.trim() || 'Guest';
      myPos.name = name;
      socket.emit('join', name);
      gameStarted = true;
      uiOverlay.style.display = 'none';
    };
    window.addEventListener('mousemove', e => { mousePos.x = e.clientX; mousePos.y = e.clientY; });
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    setInterval(() => {
      if (!gameStarted) return;
      let moveX = 0, moveY = 0;
      if (keys.w || keys.arrowup) moveY -= 5;
      if (keys.s || keys.arrowdown) moveY += 5;
      if (keys.a || keys.arrowleft) moveX -= 5;
      if (keys.d || keys.arrowright) moveX += 5;
      myPos.angle = Math.atan2(mousePos.y - window.innerHeight / 2, mousePos.x - window.innerWidth / 2);
      myPos.x = Math.max(0, Math.min(MAP_SIZE, myPos.x + moveX));
      myPos.y = Math.max(0, Math.min(MAP_SIZE, myPos.y + moveY));
      socket.emit('move', { x: myPos.x, y: myPos.y, angle: myPos.angle });
    }, 50);
    let lastFire = 0;
    const FIRE_COOLDOWN = 200;
    window.addEventListener('pointerdown', () => {
      if (!gameStarted) return;
      const now = Date.now();
      if (now - lastFire < FIRE_COOLDOWN) return;
      lastFire = now;
      const angle = Math.atan2(mousePos.y - window.innerHeight / 2, mousePos.x - window.innerWidth / 2);
      bullets.push({ id: `local-${now}`, owner: socket.id, x: myPos.x + Math.cos(angle) * 40, y: myPos.y + Math.sin(angle) * 40, vx: Math.cos(angle) * 18, vy: Math.sin(angle) * 18, life: 80 });
      socket.emit('fire', { x: myPos.x, y: myPos.y, angle });
    });
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();
    function drawPlayer(x, y, angle, name, isMe) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.fillStyle = isMe ? '#fff' : '#aaa';
      ctx.beginPath();
      ctx.moveTo(20, 0);
      ctx.lineTo(-14, 12);
      ctx.lineTo(-14, -12);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      ctx.fillStyle = '#fff';
      ctx.font = '12px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(name || 'Guest', x, y - 20);
    }
    function drawBullet(b) {
      ctx.fillStyle = 'yellow';
      ctx.beginPath();
      ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
      ctx.fill();
    }
    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(window.innerWidth / 2 - myPos.x, window.innerHeight / 2 - myPos.y);
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 1;
      for (let i = 0; i <= MAP_SIZE; i += 200) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, MAP_SIZE);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(MAP_SIZE, i);
        ctx.stroke();
      }
      for (const id in players) {
        const p = players[id];
        drawPlayer(p.x, p.y, p.angle, p.name, id === socket.id);
      }
      for (let i = 0; i < bullets.length; i++) drawBullet(bullets[i]);
      ctx.restore();
      requestAnimationFrame(render);
    }
    render();
    setInterval(() => {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += (b.vx || 0);
        b.y += (b.vy || 0);
        b.life--;
        if (b.life <= 0) bullets.splice(i, 1);
      }
      if (Array.isArray(bullets) && Array.isArray((window.serverBullets || []))) {}
    }, 16);
  </script>
</body>
</html>
