<!DOCTYPE html>
<html>
<head>
<title>Sporld IO</title>
<style>
body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; color: white; }
canvas { display: block; width: 100vw; height: 100vh; }
#ui-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0); display: flex; align-items: center; justify-content: center; z-index: 10;
}
.menu {
    background: #222; padding: 40px; border-radius: 15px; text-align: center;
    border: 2px solid #444; box-shadow: 0 0 30px rgba(0,0,0,0.5);
}
input {
    padding: 12px; font-size: 18px; border-radius: 5px; border: 2px solid #555;
    background: #111; color: white; width: 200px; margin-bottom: 20px; outline: none;
}
button {
    padding: 12px 40px; font-size: 18px; background: #008cff; color: white;
    border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
}
button:hover { background: #0072d1; }
#status { margin-top: 15px; font-size: 12px; color: #888; }
</style>
</head>
<body>

<div id="ui-overlay">
    <div class="menu">
        <input type="text" id="nickInput" placeholder="Nickname" maxlength="10">
        <br>
        <button id="playBtn">PLAY</button>
        <div id="status">Connecting...</div>
    </div>
</div>

<canvas id="canvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui-overlay');
const statusText = document.getElementById('status');
const nickInput = document.getElementById('nickInput');

const SERVER_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" 
    ? 'http://localhost:3000' 
    : 'https://sporld-server.onrender.com';

const socket = io(SERVER_URL, { transports: ['websocket'] });

let gameStarted = false;
let players = {};
let myPos = { x: 1000, y: 1000, angle: 0 };
let mousePos = { x: 0, y: 0 };
const keys = {};
const MAP_SIZE = 500;

socket.on('connect', () => { 
    statusText.innerText = "Connected"; 
    statusText.style.color = "rgb(255, 255, 255)"; 
});

socket.on('connect_error', () => { 
    statusText.innerText = "Server Offline"; 
    statusText.style.color = "#ff4444"; 
});

socket.on('update', data => { 
    players = data; 
});

document.getElementById('playBtn').onclick = () => {
    const name = nickInput.value || "Guest";
    socket.emit('join', name);
    ui.style.display = 'none';
    gameStarted = true;
};

window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => { 
    mousePos.x = e.clientX; 
    mousePos.y = e.clientY; 
};

setInterval(() => {
    if (!gameStarted) return;
    if (keys.w || keys.arrowup) myPos.y -= 5;
    if (keys.s || keys.arrowdown) myPos.y += 5;
    if (keys.a || keys.arrowleft) myPos.x -= 5;
    if (keys.d || keys.arrowright) myPos.x += 5;

    myPos.x = Math.max(0, Math.min(MAP_SIZE, myPos.x));
    myPos.y = Math.max(0, Math.min(MAP_SIZE, myPos.y));

    let centerX = window.innerWidth / 2;
    let centerY = window.innerHeight / 2;
    myPos.angle = Math.atan2(mousePos.y - centerY, mousePos.x - centerX);

    socket.emit('move', { x: myPos.x, y: myPos.y, angle: myPos.angle });
}, 16);

function drawPlayer(x, y, angle, color, name) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(20, 0); 
    ctx.lineTo(-15, 15); 
    ctx.lineTo(-15, -15);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    ctx.fillStyle = "white";
    ctx.font = "12px Arial";
    ctx.textAlign = "center";
    ctx.fillText(name, x, y - 35);
}

function render() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.scale(dpr, dpr);
    
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    ctx.save();
    ctx.translate(window.innerWidth / 2 - myPos.x, window.innerHeight / 2 - myPos.y);

    ctx.strokeStyle = "rgb(0, 0, 0, 0.2)";
    ctx.lineWidth = ;
    for (let i = 0; i <= MAP_SIZE; i += 100) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, MAP_SIZE); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(MAP_SIZE, i); ctx.stroke();
    }
  
    ctx.strokeStyle = "#33";
    ctx.lineWidth = 1;
    for (let i = 0; i <= MAP_SIZE; i += 100) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, MAP_SIZE); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(MAP_SIZE, i); ctx.stroke();
    }

    ctx.strokeStyle = "white";
    ctx.lineWidth = 1;
    ctx.strokeRect(0, 0, MAP_SIZE, MAP_SIZE);

    for (let id in players) {
        if (id !== socket.id) {
            const p = players[id];
            drawPlayer(p.x, p.y, p.angle, "#ff4444", p.name || "Guest");
        }
    }

    drawPlayer(myPos.x, myPos.y, myPos.angle, "#008cff", nickInput.value || "Guest");

    ctx.restore();
    requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
