<!DOCTYPE html>
<html>
<head>
    <title>Sporld.io</title>
    <style>body { margin: 0; background: #1a1a1a; overflow: hidden; }</style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const socket = io('https://sporld-server.onrender.com');

        let players = {};
        const keys = {};

        const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

        setInterval(() => {
            if (keys['w'] || keys['arrowup']) socket.emit('move', 'up');
            if (keys['s'] || keys['arrowdown']) socket.emit('move', 'down');
            if (keys['a'] || keys['arrowleft']) socket.emit('move', 'left');
            if (keys['d'] || keys['arrowright']) socket.emit('move', 'right');
        }, 20);

        socket.on('update', data => { players = data; });

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const me = players[socket.id];
            if (me) {
                ctx.save();
                ctx.translate(canvas.width/2 - me.x, canvas.height/2 - me.y);

                ctx.strokeStyle = "white";
                ctx.lineWidth = 5;
                ctx.strokeRect(0, 0, 2000, 2000);

                for (let id in players) {
                    const p = players[id];
                    ctx.fillStyle = (id === socket.id) ? '#4CAF50' : 'white';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 15, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            } else {
                ctx.fillStyle = "white";
                ctx.fillText("Waiting for server data...", 20, 20);
            }
            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
