<!DOCTYPE html>
<html>
<head>
    <title>Sporld.io Tracker</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const socket = io('https://sporld-server.onrender.com');

        let allCursors = {};
        
        //TRACK KEY STATES
        const keys = {
            w: false, a: false, s: false, d: false,
            arrowup: false, arrowleft: false, arrowdown: false, arrowright: false
        };

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key in keys) keys[key] = true;
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key in keys) keys[key] = false;
        });

        //SEND SMOOTH MOVEMENT AT A CONSTANT RATE
        setInterval(() => {
            if (keys.w || keys.arrowup) socket.emit('move', 'up');
            if (keys.s || keys.arrowdown) socket.emit('move', 'down');
            if (keys.a || keys.arrowleft) socket.emit('move', 'left');
            if (keys.d || keys.arrowright) socket.emit('move', 'right');
        }, 1000 / 60);

        socket.on('update', (data) => {
            allCursors = data;
        });

        function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    
    const myPlayer = allCursors[socket.id];

    if (myPlayer) {
        const cameraX = canvas.width / 2 - myPlayer.x;
        const cameraY = canvas.height / 2 - myPlayer.y;

        
        ctx.save();
        ctx.translate(cameraX, cameraY);

        

        ctx.strokeStyle = "white";
        ctx.lineWidth = 5;
        ctx.strokeRect(0, 0, 2000, 2000); 

        
        for (let id in allCursors) {
            const c = allCursors[id];
            ctx.fillStyle = (id === socket.id) ? '#4CAF50' : '#FFFFFF';
            
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.size || 10, 0, Math.PI * 2);
            ctx.fill();
        }

        
        ctx.restore();
    }

    requestAnimationFrame(render);
}
        render();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
