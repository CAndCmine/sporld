<!DOCTYPE html>
<html>
<head><style>body{margin:0;background:#1a1a1a;overflow:hidden;}</style></head>
<body>
    <canvas id="canvas"></canvas>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const socket = io('https://sporld-server.onrender.com');

        let players = {};
        let myPos = { x: 1000, y: 1000 }; // Local "Source of Truth"
        const keys = {};
        const SPEED = 7;

        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.onresize();

        window.onkeydown = e => { keys[e.key.toLowerCase()] = true; };
        window.onkeyup = e => { keys[e.key.toLowerCase()] = false; };

        // movement
        setInterval(() => {
            let moved = false;
            if (keys.w || keys.arrowup) { myPos.y -= SPEED; moved = true; }
            if (keys.s || keys.arrowdown) { myPos.y += SPEED; moved = true; }
            if (keys.a || keys.arrowleft) { myPos.x -= SPEED; moved = true; }
            if (keys.d || keys.arrowright) { myPos.x += SPEED; moved = true; }

            if (moved) {
                socket.emit('move', { x: myPos.x, y: myPos.y });
            }
        }, 16);

        socket.on('update', data => { players = data; });

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(canvas.width/2 - myPos.x, canvas.height/2 - myPos.y);

            ctx.strokeStyle = "white";
            ctx.lineWidth = 5;
            ctx.strokeRect(0, 0, 2000, 2000);

            // Grid
            ctx.strokeStyle = "#333";
            for(let i=0; i<=2000; i+=100){
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,2000); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(2000,i); ctx.stroke();
            }

            for (let id in players) {
                const p = players[id];
                ctx.fillStyle = (id === socket.id) ? '#4CAF50' : 'white';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 15, 0, 7);
                ctx.fill();
            }
            ctx.restore();
            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
