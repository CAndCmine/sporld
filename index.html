<!DOCTYPE html>
<html>
<head>
<title>Sporld IO</title>
<style>
body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; color: white; }
canvas { display: block; width: 100vw; height: 100vh; }
#ui-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 10;
}
.menu {
    background: #222; padding: 40px; border-radius: 15px; text-align: center;
    border: 2px solid #444; box-shadow: 0 0 30px rgba(0,0,0,0.5);
}
input {
    padding: 12px; font-size: 18px; border-radius: 5px; border: 1px solid #555;
    background: #111; color: white; width: 200px; margin-bottom: 20px;
}
button {
    padding: 12px 40px; font-size: 18px; background: #008cff; color: white;
    border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
}
button:hover { background: #0072d1; }
#status { margin-top: 15px; font-size: 12px; color: #888; }
</style>
</head>
<body>

<div id="ui-overlay">
    <div class="menu">
        <h1>SPORLD.IO</h1>
        <input type="text" id="nickInput" placeholder="Nickname" maxlength="10">
        <br>
        <button id="playBtn">PLAY</button>
        <div id="status">Connecting...</div>
    </div>
</div>

<canvas id="canvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui-overlay');
const statusText = document.getElementById('status');

const SERVER_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" 
    ? 'http://localhost:3000' 
    : 'https://sporld-server.onrender.com';

const socket = io(SERVER_URL, { transports: ['websocket'] });

let gameStarted = false;
let players = {};
let myPos = { x: 1000, y: 1000, angle: 0 };
let mousePos = { x: 0, y: 0 };
const keys = {};

socket.on('connect', () => { 
    statusText.innerText = "Connected"; 
    statusText.style.color = "#4CAF50"; 
});

socket.on('connect_error', () => { 
    statusText.innerText = "Server Offline"; 
    statusText.style.color = "#ff4444"; 
});

socket.on('update', data => { 
    players = data; 
});

document.getElementById('playBtn').onclick = () => {
    const name = document.getElementById('nickInput').value || "Guest";
    socket.emit('join', name);
    ui.style.display = 'none';
    gameStarted = true;
};

window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => { 
    mousePos.x = e.clientX; 
    mousePos.y = e.clientY; 
};

setInterval(() => {
    if (!gameStarted) return;
    if (keys.w || keys.arrowup) myPos.y -= 5;
    if (keys.s || keys.arrowdown) myPos.y += 5;
    if (keys.a || keys.arrowleft) myPos.x -= 5;
    if (keys.d || keys.arrowright) myPos.x += 5;

    let centerX = window.innerWidth / 2;
    let centerY = window.innerHeight / 2;
    myPos.angle = Math.atan2(mousePos.y - centerY, mousePos.x - centerX);

    socket.emit('move', { x: myPos.x, y: myPos.y, angle: myPos.angle });
}, 16);

function render() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    if (gameStarted) {
        ctx.save();
        ctx.translate(window.innerWidth / 2 - myPos.x, window.innerHeight / 2 - myPos.y);

        ctx.strokeStyle = "#333";
        for (let i = 0; i <= 2000; i += 100) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 2000); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(2000, i); ctx.stroke();
        }

        for (let id in players) {
            const p = players[id];
            const isMe = id === socket.id;
            const drawX = isMe ? myPos.x : p.x;
            const drawY = isMe ? myPos.y : p.y;
            const drawA = isMe ? myPos.angle : p.angle;

            ctx.save();
            ctx.translate(drawX, drawY);
            ctx.rotate(drawA);
            ctx.fillStyle = isMe ? "#008cff" : "#ff4444";
            ctx.beginPath();
            ctx.moveTo(20, 0); ctx.lineTo(-15, 15); ctx.lineTo(-15, -15);
            ctx.fill();
            ctx.restore();

            ctx.fillStyle = "white";
            ctx.font = "14px Arial";
            ctx.textAlign = "center";
            ctx.fillText(p.name || "Guest", drawX, drawY - 25);
        }
        ctx.restore();
    }
    requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
