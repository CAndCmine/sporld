<!DOCTYPE html>
<html>
<head>
    <title>Sporld IO - Debug Mode</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #debug { position: absolute; top: 10; left: 10; color: lime; font-family: monospace; pointer-events: none; background: rgba(0,0,0,0.5); padding: 10px; }
    </style>
</head>
<body>
<div id="debug">Connecting...</div>
<canvas id="canvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const debug = document.getElementById('debug');
const socket = io('https://sporld-server.onrender.com', { transports: ['websocket'] });

let myName = prompt("Nickname:") || "Guest";
socket.emit('join', myName);

let players = {};
let myPos = { x: 1000, y: 1000, angle: 0 };
let mousePos = { x: 0, y: 0 };
const keys = {};

window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => { mousePos.x = e.clientX; mousePos.y = e.clientY; };

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

setInterval(() => {
    if (keys.w) myPos.y -= 5;
    if (keys.s) myPos.y += 5;
    if (keys.a) myPos.x -= 5;
    if (keys.d) myPos.x += 5;

    myPos.angle = Math.atan2(mousePos.y - window.innerHeight / 2, mousePos.x - window.innerWidth / 2);
    
    socket.emit('move', { x: myPos.x, y: myPos.y, angle: myPos.angle });
}, 16);

socket.on('update', data => {
    players = data;
    let otherPlayers = Object.keys(data).filter(id => id !== socket.id);
    if (otherPlayers.length > 0) {
        let firstOther = data[otherPlayers[0]];
        debug.innerHTML = `My Angle: ${myPos.angle.toFixed(2)}<br>Other Angle: ${firstOther.angle.toFixed(2)}`;
    } else {
        debug.innerHTML = "Waiting for another player...";
    }
});

function renderPlayer(x, y, angle, color, name) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(25, 0);
    ctx.lineTo(-20, 20);
    ctx.lineTo(-20, -20);
    ctx.closePath();
    ctx.lineWidth = 10;
    ctx.strokeStyle = "white";
    ctx.stroke();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();
    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.fillText(name, x, y - 45);
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(canvas.width / 2 - myPos.x, canvas.height / 2 - myPos.y);

    for (let id in players) {
        const p = players[id];
        if (id === socket.id) {
            renderPlayer(myPos.x, myPos.y, myPos.angle, "blue", myName);
        } else {
            renderPlayer(p.x, p.y, p.angle, "red", p.name);
        }
    }
    ctx.restore();
    requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
